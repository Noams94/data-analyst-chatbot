# Fly.io config for the FastAPI service.
# Deploy with:  cd api && fly launch --no-deploy && fly secrets set ... && fly deploy

app = "data-analyst-chatbot-api"
primary_region = "fra"  # Frankfurt — closest EU region; change if you prefer

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATA_DIR = "/data"

[[mounts]]
  source = "data_volume"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
