[theme]
base                     = "dark"
primaryColor             = "#10a37f"
backgroundColor          = "#212121"
secondaryBackgroundColor = "#171717"
textColor                = "#ececec"
font                     = "sans serif"

[server]
maxUploadSize = 200        # MB — allow large CSV/Excel files
enableCORS    = false
headless      = true       # required for Docker / cloud deployments

[browser]
gatherUsageStats = false
