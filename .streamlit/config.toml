[theme]
base                     = "light"
primaryColor             = "#10a37f"
backgroundColor          = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor                = "#1a1a1a"
font                     = "sans serif"

[server]
maxUploadSize = 200        # MB — allow large CSV/Excel files
enableCORS    = false
headless      = true       # required for Docker / cloud deployments

[browser]
gatherUsageStats = false
