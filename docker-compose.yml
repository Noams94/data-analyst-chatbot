version: "3.9"

services:
  chatbot:
    build: .
    ports:
      - "8501:8501"
    environment:
      # Provide your Anthropic API key here or in a .env file
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Persist chart temp files between container restarts (optional)
      - chart_cache:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chart_cache:
